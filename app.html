<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Rau Xanh">
<title>Rau Xanh</title>
<style>
:root {
  --bg: #0f1117;
  --surface: #1a1d27;
  --surface2: #22263a;
  --accent: #4ade80;
  --accent2: #22c55e;
  --blue: #60a5fa;
  --red: #f87171;
  --text: #f1f5f9;
  --sub: #64748b;
  --border: rgba(255,255,255,0.07);
  --font: -apple-system, 'SF Pro Display', sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  height: 100dvh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.app-shell { flex: 1; overflow: hidden; position: relative; }

/* Swipe container: 2 trang nằm ngang cạnh nhau */
.pages-track {
  display: flex;
  flex-direction: row;
  width: 200%;
  height: 100%;
  transition: transform 0.35s cubic-bezier(0.4,0,0.2,1);
}
.pages-track.swiping { transition: none; }
.page {
  flex: 0 0 50%;
  width: 50%;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  height: 100%;
}

/* NAVBAR */
.navbar {
  flex-shrink: 0;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 14px 20px 12px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.nav-title { font-size: 18px; font-weight: 700; letter-spacing: -0.5px; }
.nav-btn {
  background: none; border: none; font-size: 15px;
  font-family: var(--font); font-weight: 500;
  padding: 6px 10px; border-radius: 8px; cursor: pointer;
  color: var(--blue);
}
.nav-btn.red { color: var(--red); }
.nav-btn.green { color: var(--accent); }

/* TOTAL BAR — fixed dưới navbar */
.total-bar {
  flex-shrink: 0;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 10px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.total-label { font-size: 12px; font-weight: 600; color: var(--sub); letter-spacing: 1px; text-transform: uppercase; }
.total-amount { font-size: 22px; font-weight: 800; color: var(--accent); letter-spacing: -0.5px; }

/* SCROLL AREA — chỉ phần này cuộn */
.scroll-area { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 14px 16px 20px; }

/* LIST */
.list-card { background: var(--surface); border-radius: 16px; overflow: hidden; border: 1px solid var(--border); margin-bottom: 8px; }
.list-item { display: flex; align-items: center; padding: 13px 16px; gap: 12px; border-bottom: 1px solid var(--border); }
.list-item:last-child { border-bottom: none; }
.item-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); flex-shrink: 0; }
.item-info { flex: 1; min-width: 0; }
.item-name { font-size: 15px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.item-price { font-size: 12px; color: var(--sub); margin-top: 2px; }

.delete-btn {
  background: rgba(248,113,113,0.12); border: none; color: var(--red);
  font-size: 20px; width: 32px; height: 32px; border-radius: 8px;
  display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0;
}

/* CALC */
.qty-wrap { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
.qty-input {
  width: 62px; background: var(--surface2); border: 1px solid var(--border);
  border-radius: 10px; padding: 8px 6px; font-size: 15px; font-weight: 600;
  font-family: var(--font); text-align: center; color: var(--text); -webkit-appearance: none;
}
.qty-input:focus { outline: none; border-color: var(--accent); background: rgba(74,222,128,0.06); }
.unit-label { font-size: 12px; color: var(--sub); }
.item-total { font-size: 13px; font-weight: 600; color: var(--accent); min-width: 76px; text-align: right; flex-shrink: 0; }
.item-total.dim { color: var(--sub); font-weight: 400; }

.reset-row { display: flex; justify-content: center; padding: 10px 0; }
.reset-btn {
  background: rgba(248,113,113,0.1); border: 1px solid rgba(248,113,113,0.2);
  color: var(--red); font-size: 14px; font-family: var(--font); font-weight: 500;
  padding: 8px 24px; border-radius: 20px; cursor: pointer;
}

/* EMPTY */
.empty { text-align: center; padding: 60px 20px; color: var(--sub); font-size: 15px; line-height: 1.7; }
.empty-icon { font-size: 38px; margin-bottom: 10px; }

/* TAB BAR */
.tabbar {
  flex-shrink: 0; background: var(--surface); border-top: 1px solid var(--border);
  display: flex; padding: 8px 0 24px;
}
.tab {
  flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px;
  cursor: pointer; padding: 4px; border: none; background: none;
}
.tab-icon { font-size: 22px; line-height: 1; }
.tab-label { font-size: 10px; color: var(--sub); font-family: var(--font); font-weight: 500; }
.tab.active .tab-label { color: var(--accent); }

/* MODAL */
.modal-overlay {
  display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.65);
  z-index: 200; align-items: flex-end; backdrop-filter: blur(4px);
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--surface); border-radius: 24px 24px 0 0; width: 100%;
  max-height: 82dvh; display: flex; flex-direction: column;
  border: 1px solid var(--border); border-bottom: none;
}
.modal-handle { width: 36px; height: 4px; background: rgba(255,255,255,0.15); border-radius: 2px; margin: 10px auto 0; flex-shrink: 0; }
.modal-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 20px 14px; border-bottom: 1px solid var(--border); flex-shrink: 0;
}
.modal-title { font-size: 17px; font-weight: 700; }
.modal-body { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 16px; }

/* FORM */
.input-row {
  display: flex; align-items: center; gap: 10px; background: var(--surface2);
  border-radius: 12px; padding: 12px 14px; margin-bottom: 8px; border: 1px solid var(--border);
}
.input-row:focus-within { border-color: rgba(74,222,128,0.3); }
.form-input { flex: 1; border: none; background: none; font-size: 15px; font-family: var(--font); color: var(--text); }
.form-input:focus { outline: none; }
.form-input::placeholder { color: var(--sub); }
.price-field { width: 90px; text-align: right; flex: none; }
.form-unit { font-size: 13px; color: var(--sub); flex-shrink: 0; }
.add-row-btn {
  display: flex; align-items: center; gap: 8px; color: var(--blue); font-size: 15px;
  font-family: var(--font); font-weight: 500; background: none; border: none; cursor: pointer; padding: 10px 4px;
}

/* RECEIPT */
.receipt-header-block {
  background: linear-gradient(135deg, #16a34a, #166534);
  padding: 20px; border-radius: 16px; margin-bottom: 12px; text-align: center;
}
.receipt-title-text { font-size: 20px; font-weight: 800; color: white; letter-spacing: 2px; }
.receipt-date-text { font-size: 12px; color: rgba(255,255,255,0.65); margin-top: 4px; }
.receipt-card { background: var(--surface2); border-radius: 16px; overflow: hidden; border: 1px solid var(--border); }
.receipt-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 12px 16px; border-bottom: 1px solid var(--border);
}
.receipt-row:last-child { border-bottom: none; }
.receipt-item-name { font-size: 14px; font-weight: 600; }
.receipt-item-detail { font-size: 12px; color: var(--sub); margin-top: 2px; }
.receipt-item-amt { font-size: 14px; font-weight: 700; color: var(--accent); }
.receipt-total-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 16px; margin-top: 12px; background: var(--surface2); border-radius: 16px; border: 1px solid var(--border);
}
.receipt-total-label { font-size: 15px; font-weight: 700; }
.receipt-total-val { font-size: 22px; font-weight: 800; color: var(--accent); }
</style>
</head>
<body>

<div class="app-shell">
<div class="pages-track" id="pages-track">

  <!-- PAGE 1: MENU -->
  <div class="page" id="page-menu">
    <div class="navbar">
      <button class="nav-btn green" onclick="openAddModal()">＋ Thêm</button>
      <span class="nav-title">🥬 Menu</span>
      <button class="nav-btn" id="edit-btn" onclick="toggleEdit()">Sửa</button>
    </div>
    <div class="scroll-area">
      <div id="menu-list"></div>
      <div class="empty" id="menu-empty" style="display:none">
        <div class="empty-icon">🛒</div>
        Chưa có sản phẩm nào.<br>Nhấn <b>＋ Thêm</b> để bắt đầu.
      </div>
    </div>
  </div>

  <!-- PAGE 2: TÍNH TIỀN -->
  <div class="page" id="page-calc">
    <!-- VÙNG CỐ ĐỊNH: không cuộn -->
    <div class="navbar">
      <span class="nav-title">💰 Tính tiền</span>
      <button class="nav-btn green" onclick="openReceipt()">Hoá đơn</button>
    </div>
    <div class="total-bar">
      <span class="total-label">Tổng cộng</span>
      <span class="total-amount" id="total-display">0 đ</span>
    </div>
    <!-- VÙNG CUỘN: chỉ phần danh sách -->
    <div class="scroll-area">
      <div id="calc-list"></div>
      <div class="reset-row" id="reset-row" style="display:none">
        <button class="reset-btn" onclick="resetAll()">🔄 Reset tất cả</button>
      </div>
      <div class="empty" id="calc-empty" style="display:none">
        <div class="empty-icon">📦</div>
        Chưa có sản phẩm nào.<br>Vào tab Menu để thêm.
      </div>
    </div>
  </div><!-- end page-calc -->

</div><!-- end pages-track -->
</div><!-- end app-shell -->

<!-- TAB BAR -->
<div class="tabbar">
  <button class="tab active" id="tab-menu" onclick="switchTab('menu')">
    <span class="tab-icon">🛒</span>
    <span class="tab-label">Menu</span>
  </button>
  <button class="tab" id="tab-calc" onclick="switchTab('calc')">
    <span class="tab-icon">⚖️</span>
    <span class="tab-label">Tính tiền</span>
  </button>
</div>

<!-- MODAL: THÊM SẢN PHẨM -->
<div class="modal-overlay" id="add-modal" onclick="closeAddModal(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <button class="nav-btn red" onclick="closeAddModal()">Huỷ</button>
      <span class="modal-title">Thêm sản phẩm</span>
      <button class="nav-btn green" onclick="saveProducts()">Xong</button>
    </div>
    <div class="modal-body">
      <div id="new-items-list"></div>
      <button class="add-row-btn" onclick="addNewRow()">
        <span style="font-size:18px">⊕</span> Thêm dòng
      </button>
    </div>
  </div>
</div>

<!-- MODAL: HOÁ ĐƠN -->
<div class="modal-overlay" id="receipt-modal" onclick="closeReceipt(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <span style="width:60px"></span>
      <span class="modal-title">Hoá đơn</span>
      <button class="nav-btn" onclick="closeReceipt()">Đóng</button>
    </div>
    <div class="modal-body">
      <div class="receipt-header-block">
        <div class="receipt-title-text">HOÁ ĐƠN</div>
        <div class="receipt-date-text" id="receipt-date"></div>
      </div>
      <div class="receipt-card" id="receipt-items"></div>
      <div class="receipt-total-row">
        <span class="receipt-total-label">Tổng cộng</span>
        <span class="receipt-total-val" id="receipt-total"></span>
      </div>
    </div>
  </div>
</div>

<script>
let products = JSON.parse(localStorage.getItem('products') || 'null') || [
  { id: 1, name: 'Cà chua', price: 20000 },
  { id: 2, name: 'Khoai tây', price: 15000 }
];
let nextId = Math.max(...products.map(p => p.id), 0) + 1;
let quantities = {};
let isEditing = false;

function saveData() { localStorage.setItem('products', JSON.stringify(products)); }
function fmt(v) { return Number(v).toLocaleString('vi-VN') + ' đ'; }

// ===== SWIPE / TAB =====
const tabs = ['menu', 'calc'];
let currentTab = 0;
const track = document.getElementById('pages-track');

function goToTab(index, animate = true) {
  track.style.transition = animate ? 'transform 0.32s cubic-bezier(0.4,0,0.2,1)' : 'none';
  track.style.transform = `translateX(-${index * W()}px)`;
  document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', i === index));
  currentTab = index;
  if (tabs[index] === 'calc') renderCalc();
}

function switchTab(tab) {
  goToTab(tabs.indexOf(tab));
}

// ===== GESTURE ENGINE =====
// Chiến lược: xác định hướng vuốt ngay từ đầu (ngang vs dọc)
// Nếu ngang → intercept và chạy swipe, KHÔNG cho scroll
// Nếu dọc  → bỏ qua hoàn toàn, để browser scroll tự nhiên

let tx = 0, ty = 0, locked = null; // locked: 'h' | 'v' | null
const W = () => window.innerWidth;

document.addEventListener('touchstart', e => {
  if (e.touches.length !== 1) return;
  tx = e.touches[0].clientX;
  ty = e.touches[0].clientY;
  locked = null;
}, { passive: true });

document.addEventListener('touchmove', e => {
  if (e.touches.length !== 1) return;
  const dx = e.touches[0].clientX - tx;
  const dy = e.touches[0].clientY - ty;

  // Chờ đủ 12px để xác định hướng — ưu tiên dọc (ratio 2:1)
  if (!locked) {
    if (Math.abs(dx) < 12 && Math.abs(dy) < 12) return;
    locked = Math.abs(dx) > Math.abs(dy) * 2 ? 'h' : 'v';
  }

  // Dọc → thoát hoàn toàn, scroll tự nhiên
  if (locked === 'v') return;

  // Ngang → chặn scroll, chạy swipe
  e.preventDefault();
  const base = -(currentTab * W());
  const moved = base + dx;
  const clamped = Math.max(-W(), Math.min(0, moved));
  track.style.transition = 'none';
  track.style.transform = `translateX(${clamped}px)`;
}, { passive: false });

document.addEventListener('touchend', e => {
  if (locked !== 'h') { locked = null; return; }
  const dx = e.changedTouches[0].clientX - tx;
  const dt = Date.now();
  const threshold = W() * 0.3;
  const isFlick = Math.abs(dx) > 50;
  const isDrag = Math.abs(dx) > threshold;

  if ((isFlick || isDrag) && dx < 0 && currentTab < tabs.length - 1) {
    goToTab(currentTab + 1);
  } else if ((isFlick || isDrag) && dx > 0 && currentTab > 0) {
    goToTab(currentTab - 1);
  } else {
    goToTab(currentTab); // snap back
  }
  locked = null;
}, { passive: true });

// MENU
function renderMenu() {
  const list = document.getElementById('menu-list');
  const empty = document.getElementById('menu-empty');
  if (!products.length) { list.innerHTML = ''; empty.style.display = 'block'; return; }
  empty.style.display = 'none';
  list.innerHTML = `<div class="list-card">` + products.map(p => `
    <div class="list-item">
      <div class="item-dot"></div>
      <div class="item-info">
        <div class="item-name">${p.name}</div>
        <div class="item-price">${fmt(p.price)} / kg</div>
      </div>
      ${isEditing ? `<button class="delete-btn" onclick="deleteProduct(${p.id})">−</button>` : ''}
    </div>`).join('') + `</div>`;
}
function toggleEdit() {
  isEditing = !isEditing;
  document.getElementById('edit-btn').textContent = isEditing ? 'Xong' : 'Sửa';
  renderMenu();
}
function deleteProduct(id) { products = products.filter(p => p.id !== id); saveData(); renderMenu(); }

// ADD MODAL
function openAddModal() {
  document.getElementById('new-items-list').innerHTML = '';
  addNewRow();
  document.getElementById('add-modal').classList.add('open');
}
function closeAddModal(e) {
  if (!e || e.target === document.getElementById('add-modal'))
    document.getElementById('add-modal').classList.remove('open');
}
function addNewRow() {
  const div = document.createElement('div');
  div.className = 'input-row';
  div.innerHTML = `
    <input class="form-input" placeholder="Tên sản phẩm" type="text" autocomplete="off">
    <input class="form-input price-field" placeholder="Giá" type="number" inputmode="numeric">
    <span class="form-unit">đ/kg</span>`;
  document.getElementById('new-items-list').appendChild(div);
  div.querySelector('input').focus();
}
function saveProducts() {
  document.querySelectorAll('#new-items-list .input-row').forEach(row => {
    const inputs = row.querySelectorAll('input');
    const name = inputs[0].value.trim();
    const price = parseFloat(inputs[1].value);
    if (name && !isNaN(price) && price > 0) products.push({ id: nextId++, name, price });
  });
  saveData(); renderMenu(); closeAddModal();
}

// CALC
function renderCalc() {
  const list = document.getElementById('calc-list');
  const empty = document.getElementById('calc-empty');
  const resetRow = document.getElementById('reset-row');
  if (!products.length) { list.innerHTML = ''; empty.style.display = 'block'; resetRow.style.display = 'none'; updateTotal(); return; }
  empty.style.display = 'none';
  list.innerHTML = `<div class="list-card">` + products.map(p => {
    const qty = quantities[p.id] || '';
    const val = parseFloat(qty) || 0;
    return `
      <div class="list-item">
        <div class="item-dot"></div>
        <div class="item-info">
          <div class="item-name">${p.name}</div>
          <div class="item-price">${fmt(p.price)} / kg</div>
        </div>
        <div class="qty-wrap">
          <input class="qty-input" type="number" inputmode="decimal" placeholder="0"
            value="${qty}" oninput="setQty(${p.id}, this.value)" onfocus="scrollToMe(this)">
          <span class="unit-label">kg</span>
        </div>
        <span class="item-total ${val === 0 ? 'dim' : ''}" id="total-${p.id}">${val > 0 ? fmt(val * p.price) : '—'}</span>
      </div>`;
  }).join('') + `</div>`;
  updateTotal();
  const hasQty = Object.values(quantities).some(v => parseFloat(v) > 0);
  resetRow.style.display = hasQty ? 'flex' : 'none';
}

// Khi focus vào input → scroll item đó vào giữa vùng nhìn thấy
function scrollToMe(el) {
  setTimeout(() => el.scrollIntoView({ behavior: 'smooth', block: 'center' }), 320);
}

function setQty(id, val) {
  quantities[id] = val;
  const p = products.find(x => x.id === id);
  const num = parseFloat(val) || 0;
  const el = document.getElementById('total-' + id);
  if (el) { el.textContent = num > 0 ? fmt(num * p.price) : '—'; el.className = 'item-total' + (num === 0 ? ' dim' : ''); }
  updateTotal();
  const hasQty = Object.values(quantities).some(v => parseFloat(v) > 0);
  document.getElementById('reset-row').style.display = hasQty ? 'flex' : 'none';
}
function updateTotal() {
  const total = products.reduce((s, p) => s + (parseFloat(quantities[p.id]) || 0) * p.price, 0);
  document.getElementById('total-display').textContent = fmt(total);
}
function resetAll() { quantities = {}; renderCalc(); }

// RECEIPT
function openReceipt() {
  const now = new Date();
  document.getElementById('receipt-date').textContent =
    now.toLocaleDateString('vi-VN', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
  let html = ''; let total = 0;
  products.forEach(p => {
    const qty = parseFloat(quantities[p.id]) || 0;
    if (qty > 0) {
      const amt = qty * p.price; total += amt;
      html += `<div class="receipt-row"><div><div class="receipt-item-name">${p.name}</div><div class="receipt-item-detail">${qty} kg × ${fmt(p.price)}</div></div><div class="receipt-item-amt">${fmt(amt)}</div></div>`;
    }
  });
  if (!html) html = `<div class="receipt-row" style="justify-content:center;color:var(--sub)">Chưa nhập số lượng nào</div>`;
  document.getElementById('receipt-items').innerHTML = html;
  document.getElementById('receipt-total').textContent = fmt(total);
  document.getElementById('receipt-modal').classList.add('open');
}
function closeReceipt(e) {
  if (!e || e.target === document.getElementById('receipt-modal'))
    document.getElementById('receipt-modal').classList.remove('open');
}

renderMenu();
goToTab(0, false);
</script>
</body>
</html>
